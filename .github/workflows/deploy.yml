name: Deploy AgentLedger

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ── Type check + lint ───────────────────────────────────────────────────────
  check:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx tsc --noEmit

  # ── Deploy Next.js to Vercel ────────────────────────────────────────────────
  deploy-web:
    name: Deploy web app (Vercel)
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - name: Deploy to Vercel
        run: npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ── Deploy ingest service to Railway ────────────────────────────────────────
  deploy-ingest:
    name: Deploy ingest service (Railway)
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm install -g @railway/cli
      - name: Deploy ingest to Railway
        working-directory: services/ingest
        run: |
          npm ci
          railway up --service agentledger-ingest --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # ── Publish SDK to npm ──────────────────────────────────────────────────────
  publish-sdk:
    name: Publish SDK (npm)
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, '[publish-sdk]')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org
          cache: npm
      - working-directory: packages/sdk
        run: npm ci && npm run build && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── Run DB migrations on deploy ─────────────────────────────────────────────
  migrate:
    name: Run DB migrations
    runs-on: ubuntu-latest
    needs: [deploy-web]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # ── Seed outreach sequences on first deploy ─────────────────────────────────
  seed-sequences:
    name: Seed outreach sequences
    runs-on: ubuntu-latest
    needs: [migrate]
    if: github.event.head_commit.message == 'chore: initial deploy'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: node scripts/seed-sequences.js
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
